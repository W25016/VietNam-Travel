<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vietnam Travel Guide — Chronicle</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

</head>
<body>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #d97706;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; background: #000; color: #f0ece0; font-family: var(--font-body); }

    /* NAV */
    nav { position: fixed; top: 0; left: 56px; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 1rem; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(20px); background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-top: none; border-radius: 0 0 1rem 1rem; padding: 0.5rem 2rem; width: 100%; max-width: 768px; }
    .nav-logo { display: flex; gap: 0.5rem; align-items: center; text-decoration: none; }
    .nav-logo-white { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: white; }
    .nav-logo-gold  { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: #fbbf24; font-style: italic; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link { padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: white; }
    .nav-link.active { background: var(--primary); color: white; }

    /* TIMELINE SIDEBAR */
    #sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 75px;z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); }
    .month-btn { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; padding: 0.5rem 0; cursor: pointer; background: none; border: none; transition: all 0.2s; }
    .month-btn .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #fbbf24; display: none; }
    .month-btn.active .bar { display: block; }
    .month-btn span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); transition: all 0.2s; }
    .month-btn.active span { color: #fbbf24; font-weight: 700; transform: scale(1.1); }
    .month-btn:hover span { color: rgba(255,255,255,0.8); }

    /* HERO */
    #hero { position: fixed; inset: 0; overflow: hidden; }
    #hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.9s ease, transform 0.9s ease; }
    .hero-overlay-t { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.3)); }
    .hero-overlay-l { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.1) 60%, transparent); }

    /* ROMAN NUMERAL WATERMARK */
    #roman { position: absolute; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; user-select: none; overflow: hidden; opacity: 0.12; font-family: var(--font-display); font-size: clamp(10rem, 28vw, 34rem); font-weight: 900; color: white; line-height: 1; transition: opacity 0.4s; }

    /* CONTENT PANEL */
    #content { position: absolute; bottom: 14rem; left: 0; right: 0; z-index: 10; padding-left: clamp(5rem, 10vw, 9rem); padding-right: 1.5rem; max-width: 750px; transition: opacity 0.55s ease, transform 0.55s ease; }
    #content.fade-out { opacity: 0; transform: translateY(-15px); }
    .pill { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); border-radius: 9999px; padding: 0.375rem 1rem; margin-bottom: 1rem; }
    .pill-coords { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.9); letter-spacing: 0.15em; }
    .pill-sep { width: 5px; height: 30px; background: rgba(255,255,255,0.3); }
    .pill-weather { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; }
    .time-label { font-family: var(--font-mono); font-size: 0.7rem; color: #fcd34d; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .hero-title { font-family: var(--font-display); font-size: clamp(1.25rem, 3.5vw, 2.25rem); font-weight: 700; color: white; line-height: 1.1; letter-spacing: -0.02em; text-shadow: 0 5px 30px rgba(0,0,0,0.5); margin-bottom: 0.25rem; }
    .hero-title-vi { font-family: var(--font-body); font-size: 0.875rem; color: rgba(255,255,255,0.6); font-style: italic; margin-bottom: 0.75rem; }
    .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(40px); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 1rem; padding: 2.5rem 2.75rem; box-shadow: 0 30px 70px rgba(0,0,0,0.3); max-width: 750px; }
    .glass-card p { font-family: var(--font-body); font-size: 1.75rem; color: rgba(255,255,255,0.9); line-height: 1.3; }
    .glass-card-footer { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 0.5rem; }
    .glass-card-elev{font-family: var(--font-mono); font-size: 10px; color: #fbbf24; letter-spacing: 0.15em; } 
    .glass-card-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
    .glass-card-cap { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.08sem; }

    /* SCROLL HINT */
    .scroll-hint { position: fixed; bottom: 11rem; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; pointer-events: none; }
    .scroll-hint span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    .scroll-line { width: 1px; height: 24px; background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* GALLERY STRIP */
    #gallery-wrap { position: fixed; bottom: 0; left: 56px; right: 0; z-index: 20; padding: 0.75rem 1rem 0.75rem; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 60%, transparent); }
    .gallery-inner { position: relative; }
    .gallery-strip { display: flex; gap: 0.75rem; overflow-x: hidden; scroll-behavior: smooth; padding: 0.25rem 2.5rem; scrollbar-width: none; transition: transform 0.4s ease;}
    .gallery-strip::-webkit-scrollbar { display: none; }
    .gallery-thumb { position: relative; flex: 1 1 0; min-width: 0; height: 88px; border-radius: 0.75rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: border-color 0.3s; background: none; padding: 0; }
    .gallery-thumb:hover { border-color: rgba(255,255,255,0.4); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
    .gallery-thumb:hover img { transform: scale(1.1); }
    .gallery-thumb-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
    .gallery-thumb-cap { position: absolute; bottom: 0.5rem; left: 0.5rem; right: 0.5rem; font-family: var(--font-body); font-size: 10px; color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; }
    .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; width: 2rem; height: 2rem; border-radius: 9999px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; line-height: 1; transition: background 0.2s; }
    .gallery-arrow:hover { background: rgba(0,0,0,0.6); }
    .gallery-arrow-left { left: 0; }
    .gallery-arrow-right { right: 0; }

    /* MONTH DIAL */
    #dial-wrap { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50; }
    #dial-toggle { width: 3.25rem; height: 3.25rem; border-radius: 9999px; background: var(--primary); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(217,119,6,0.4); font-size: 1.25rem; transition: transform 0.2s; }
    #dial-toggle:hover { transform: scale(1.05); }
    #dial-menu { position: absolute; bottom: 4rem; right: 0; background: rgba(20,20,30,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 1rem; padding: 1rem; display: none; width: 14rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    #dial-menu.open { display: block; }
    .dial-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .dial-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.625rem 0.25rem; border-radius: 0.5rem; border: none; cursor: pointer; background: transparent; color: rgba(255,255,255,0.5); transition: all 0.2s; font-family: var(--font-body); }
    .dial-btn:hover { background: rgba(255,255,255,0.08); color: white; }
    .dial-btn.active { background: var(--primary); color: white; }
    .dial-btn-roman { font-family: var(--font-mono); font-size: 9px; }
    .dial-btn-label { font-size: 11px; font-weight: 500; }

    /* LIGHTBOX */
    #lightbox { position: absolute; top; z-index: 200; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 1rem; }
    #lightbox.open { display: flex; }
    .lb-inner { position: relative; max-width: 900px; width: 100%; border-radius: 1rem; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
    .lb-inner img { width: 100%; max-height: 80vh; object-fit: cover; display: block; }
    .lb-cap { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 1.25rem; }
    .lb-cap p { font-family: var(--font-body); font-size: 0.875rem; color: white; }
    .lb-close { position: absolute; top: 0.75rem; right: 0.75rem; width: 2rem; height: 2rem; border-radius: 9999px; background: rgba(0,0,0,0.5); border: none; color: white; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .lb-close:hover { background: rgba(0,0,0,0.8); }

    @media (max-width: 640px) {
      nav { left: 0; }
      #sidebar { display: none; }
      #content { padding-left: 1rem; }
      #gallery-wrap { left: 0; }
    }
  </style>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-white">Vietnam</span>
      <span class="nav-logo-gold">Travel</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Chronicle</a>
      <a href="gourmet.html" class="nav-link">Gourmet</a>
      <a href="tours.html" class="nav-link">Tours</a>
    </div>
  </div>
</nav>

<div id="sidebar"></div>

<div id="hero">
  <img id="hero-img" src="" alt="" />
  <div class="hero-overlay-t"></div>
  <div class="hero-overlay-l"></div>
  <div id="roman"></div>
  <div id="content">
    <div class="pill">
      <span class="pill-coords" id="coords"></span>
      <span class="pill-sep"></span>
      <span class="pill-weather" id="weather"></span>
    </div>
    <p class="time-label" id="time"></p>
    <h1 class="hero-title" id="titleJp"></h1>
    <p class="hero-title-vi" id="titleVi"></p>
    <div class="glass-card">
      <p id="descJp"></p>
      <div class="glass-card-footer">
        <span class="glass-card-elev" id="elevation"></span>
        <span class="glass-card-sep"></span>
        <span class="glass-card-cap" id="captionVi"></span>
      </div>
    </div>
  </div>
</div>

<div id="gallery-wrap">
  <div class="gallery-inner">
    <button class="gallery-arrow gallery-arrow-left" onclick="galleryScroll(-1)">‹</button>
    <div class="gallery-strip" id="galleryStrip"></div>
    <button class="gallery-arrow gallery-arrow-right" onclick="galleryScroll(1)">›</button>
  </div>
</div>

<div id="dial-wrap">
  <div id="dial-menu"><div class="dial-grid" id="dialGrid"></div></div>
  <button id="dial-toggle" onclick="toggleDial()">⊕</button>
</div>

<div id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner">
    <img id="lb-img" src="" alt="" />
    <div class="lb-cap"><p id="lb-cap"></p></div>
    <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
  </div>
</div>

<script src="data.js"></script>

<script>
// ── STATE ────────────────────────────────────────────
let activeMonth = new Date().getMonth() + 1;
let isAnimating = false; 
let touchStartY = 0;
let galleryIndex = 0;


// ── DOM ELEMENTS ──────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const dialGrid = document.getElementById('dialGrid');
const galleryStrip = document.getElementById('galleryStrip');
const contentPanel = document.getElementById('content');
const heroImg = document.getElementById('hero-img');
const romanWatermark = document.getElementById('roman');

// Kiểm tra dữ liệu đầu vào từ data.js
if (typeof travelData === 'undefined' || typeof galleryImages === 'undefined') {
  console.error("LỖI: Không tìm thấy dữ liệu từ file data.js! Hãy chắc chắn bạn đã đặt file data.js chung thư mục với index.html.");
}

// ── RENDER UI COMPONENTS ──────────────────────────────
function initUI() {
  if (typeof travelData === 'undefined') return;

  // Render Sidebar các tháng ở rìa trái
  sidebar.innerHTML = travelData.map(item => `
    <button class="month-btn ${item.month === activeMonth ? 'active' : ''}" data-month="${item.month}" onclick="selectMonth(${item.month})">
      <div class="bar"></div>
      <span>${item.monthLabel}</span>
    </button>
  `).join('');

  // Render Dial Menu (vòng quay số) góc dưới phải
  dialGrid.innerHTML = travelData.map(item => `
    <button class="dial-btn ${item.month === activeMonth ? 'active' : ''}" data-month="${item.month}" onclick="selectMonth(${item.month}); toggleDial();">
      <span class="dial-btn-roman">${item.romanNumeral}</span>
      <span class="dial-btn-label">${item.monthLabel}</span>
    </button>
  `).join('');
}

function toggleDial() { 
  const dialMenu = document.getElementById('dial-menu');
  if (dialMenu) dialMenu.classList.toggle('open'); 
}

// ── CORE RENDER (CINEMATIC TRANSITION) ────────────────
function render(month) {
  if (typeof travelData === 'undefined') return;
  
  const d = travelData.find(x => x.month === month);
  if (!d || isAnimating) return;

  isAnimating = true;

  // Bước 1: Hiệu ứng biến mất (Fade Out) đồng bộ mượt mà
  if (contentPanel) contentPanel.classList.add('fade-out');
  if (romanWatermark) romanWatermark.style.opacity = '0';
  if (heroImg) {
    heroImg.style.opacity = '0.2';
    heroImg.style.transform = 'scale(1.05)';
  }

  // Bước 2: Cập nhật dữ liệu sau khi giao diện đã mờ hẳn (400ms)
  setTimeout(() => {
    if (heroImg) {
      heroImg.src = d.img;
      heroImg.alt = d.titleJp;
    }
    if (romanWatermark) romanWatermark.textContent = d.romanNumeral;
    
    // Đổ dữ liệu văn bản vào các thẻ tương ứng
    const textElements = {
      'coords': d.coords, 'weather': d.weather, 'time': d.time,
      'titleJp': d.titleJp, 'titleVi': d.titleVi, 'descJp': d.descJp,
      'elevation': d.elevation, 'captionVi': d.captionVi
    };
    
    Object.keys(textElements).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = textElements[id];
    });

    // Render bộ Album ảnh chân trang sử dụng thuộc tính "img.cap"
    const currentGallery = galleryImages[month] || [];
    if (galleryStrip) {
      galleryStrip.innerHTML = currentGallery.map((img, index) => `
        <button class="gallery-thumb" onclick="openLightboxByIndex(${month}, ${index})">
          <img src="${img.url}" alt="${img.cap || ''}" loading="lazy"/>
          <div class="gallery-thumb-overlay"></div>
          <span class="gallery-thumb-cap">${img.cap || ''}</span>
        </button>
      `).join('');
    galleryStrip.scrollLeft = 0; 
galleryStrip.style.transform = 'translateX(0)';
galleryIndex = 0;
    }

    // Đồng bộ trạng thái .active cho menu điều hướng
    document.querySelectorAll('.month-btn').forEach(b => b.classList.toggle('active', +b.dataset.month === month));
    document.querySelectorAll('.dial-btn').forEach(b => b.classList.toggle('active', +b.dataset.month === month));

    // Bước 3: Hiệu ứng hiển thị trở lại (Fade In)
    if (heroImg) {
      heroImg.onload = () => {
        heroImg.style.opacity = '1';
        heroImg.style.transform = 'scale(1)';
      };
      if (heroImg.complete) {
        heroImg.style.opacity = '1';
        heroImg.style.transform = 'scale(1)';
      }
    }

    if (contentPanel) contentPanel.classList.remove('fade-out');
    if (romanWatermark) romanWatermark.style.opacity = '0.12';

    // Mở khóa cho lần tương tác tiếp theo
    setTimeout(() => { isAnimating = false; }, 300);
  }, 400);
}

function selectMonth(month) { 
  activeMonth = month; 
  render(month); 
}

function navigate(direction) {
  if (isAnimating) return;
  let targetMonth = activeMonth + direction;
  if (targetMonth > 12) targetMonth = 1;
  if (targetMonth < 1) targetMonth = 12;
  selectMonth(targetMonth);
}

function galleryScroll(dir) {
  const strip = document.getElementById('galleryStrip');
  const thumbs = strip.querySelectorAll('.gallery-thumb');
  if (!thumbs.length) return;

  const maxIndex = thumbs.length - 1;
  galleryIndex = Math.max(0, Math.min(maxIndex, galleryIndex + dir));

  const offset = thumbs[galleryIndex].offsetLeft;
  strip.style.transform = `translateX(-${offset}px)`;
}

// ── LIGHTBOX (PHÓNG TO ẢNH THƯ VIỆN) ──────────────────
function openLightboxByIndex(month, index) {
  const img = galleryImages[month]?.[index];
  if (!img) return;
  
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-cap');
  const lightbox = document.getElementById('lightbox');
  
  if (lbImg) lbImg.src = img.url;
  if (lbCap) lbCap.textContent = img.cap || ''; 
  if (lightbox) lightbox.classList.add('open');
}

function closeLightbox(e) { 
  const lightbox = document.getElementById('lightbox');
  if (!lightbox) return;
  if (e.target === lightbox || e.target.classList.contains('lb-close')) {
    lightbox.classList.remove('open'); 
  }
}

// ── INTERACTION LISTENERS (KEYBOARD, WHEEL, TOUCH) ───
document.addEventListener('keydown', e => {
  if (['ArrowDown', 'ArrowRight'].includes(e.key)) { e.preventDefault(); navigate(1); }
  else if (['ArrowUp', 'ArrowLeft'].includes(e.key)) { e.preventDefault(); navigate(-1); }
  else if (e.key === 'Escape') { 
    const lb = document.getElementById('lightbox');
    const dm = document.getElementById('dial-menu');
    if (lb) lb.classList.remove('open'); 
    if (dm) dm.classList.remove('open'); 
  }
});

window.addEventListener('wheel', e => {
  if (Math.abs(e.deltaY) < 20) return; 
  e.preventDefault(); 
  navigate(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

window.addEventListener('touchstart', e => { 
  touchStartY = e.touches[0].clientY; 
}, { passive: true });

window.addEventListener('touchend', e => {
  const touchEndY = e.changedTouches[0].clientY;
  const diffY = touchStartY - touchEndY;
  if (Math.abs(diffY) > 60) { 
    navigate(diffY > 0 ? 1 : -1);
  }
}, { passive: true });

// ── INIT APP ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initUI();
  render(activeMonth);
});
</script>
</body>
</html>
