<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅程の招待 — Vietnam Travel Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #12151e;
      --fg: #f0ece0;
      --muted: #6b7280;
      --primary: #d97706;
      --primary-fg: #ffffff;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.1);
      --secondary: rgba(255,255,255,0.08);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body { background: var(--bg); color: var(--fg); font-family: var(--font-body); min-height: 100vh; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 1rem; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-top: none; border-radius: 0 0 1rem 1rem; padding: 0.5rem 2rem; width: 100%; max-width: 768px; }
    .nav-logo { display: flex; gap: 0.5rem; align-items: center; text-decoration: none; }
    .nav-logo-white { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: white; }
    .nav-logo-gold  { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: #fbbf24; font-style: italic; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-link { padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.7); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: white; }
    .nav-link.active { background: var(--primary); color: white; }

    /* MAIN */
    main { max-width: 1152px; margin: 0 auto; padding: 6rem 1.5rem 5rem; }

    /* HEADER */
    .page-header { margin-bottom: 2.5rem; animation: fadeUp 0.6s ease both; }
    .label-mono { font-family: var(--font-mono); font-size: 0.7rem; color: var(--primary); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1rem; }
    .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; color: var(--fg); letter-spacing: -0.02em; margin-bottom: 1rem; }
    .page-subtitle { font-size: 1.1rem; color: var(--muted); max-width: 36rem; line-height: 1.7; }

    /* GUARANTEE BANNER */
    .guarantee { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; border-radius: 1rem; background: rgba(217,119,6,0.05); border: 1px solid rgba(217,119,6,0.15); margin-bottom: 2rem; animation: fadeUp 0.6s 0.3s ease both; opacity: 0; }
    .guarantee-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--primary); letter-spacing: 0.1em; display: block; margin-bottom: 0.2rem; }
    .guarantee-text { font-size: 0.875rem; color: rgba(240,236,224,0.7); }

    /* FILTERS */
    .filters { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 24rem; }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
    .search-input { width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem; border-radius: 9999px; background: var(--secondary); border: 1px solid rgba(255,255,255,0.12); color: var(--fg); font-family: var(--font-body); font-size: 0.875rem; outline: none; min-height: 48px; transition: box-shadow 0.2s; }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { box-shadow: 0 0 0 2px var(--primary); }

    .filter-btn { padding: 0.5rem 1rem; border-radius: 9999px; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: var(--secondary); color: var(--muted); min-height: 48px; transition: all 0.2s; }
    .filter-btn:hover { color: var(--fg); }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .type-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .type-btn { padding: 0.375rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--muted); transition: all 0.2s; }
    .type-btn:hover { color: var(--fg); }
    .type-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

    /* COUNT */
    .count { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 1.5rem; }

    /* GRID */
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }

    /* TOUR CARD */
    .tour-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 1rem; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: border-color 0.4s; animation: fadeUp 0.5s ease both; }
    .tour-card:hover { border-color: rgba(217,119,6,0.4); }
    .tour-card:hover .tc-title { color: var(--primary); }
    .tour-card:hover .tc-img { transform: scale(1.05); }

    .tc-img-wrap { position: relative; height: 192px; overflow: hidden; }
    .tc-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
    .tc-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); }
    .tc-type { position: absolute; top: 0.75rem; left: 0.75rem; font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; border: 1px solid rgba(217,119,6,0.4); color: var(--primary); border-radius: 9999px; padding: 0.2rem 0.75rem; backdrop-filter: blur(8px); background: rgba(0,0,0,0.5); }
    .tc-rating { position: absolute; top: 0.75rem; right: 0.75rem; display: flex; align-items: center; gap: 0.25rem; backdrop-filter: blur(8px); background: rgba(0,0,0,0.6); border-radius: 9999px; padding: 0.2rem 0.625rem; font-family: var(--font-mono); font-size: 0.75rem; color: var(--fg); }
    .tc-star { color: var(--primary); font-size: 0.65rem; }

    .tc-body { padding: 1.25rem; display: flex; flex-direction: column; flex: 1; }
    .tc-season { font-family: var(--font-mono); font-size: 0.6rem; color: var(--primary); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .tc-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--fg); line-height: 1.3; margin-bottom: 0.25rem; transition: color 0.3s; }
    .tc-title-vi { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-bottom: 1rem; }
    .tc-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; color: var(--muted); font-family: var(--font-mono); font-size: 0.7rem; }
    .tc-meta span { display: flex; align-items: center; gap: 0.375rem; }
    .tc-highlight{font-size: 0.875rem; color: rgba(240,236,224,0.6); line-height: 1.6; flex: 1; margin-bottom: 1.25rem;}  
    .tc-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08); }
    .tc-from { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; display: block; margin-bottom: 0.1rem; }
    .tc-price { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .tc-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; background: var(--primary); color: white; border: none; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; min-height: 48px; }
    .tc-btn:hover { opacity: 0.9; }

    /* EMPTY */
    .empty { text-align: center; padding: 5rem 0; color: var(--muted); }
    .empty-emoji { font-size: 2.5rem; margin-bottom: 1rem; }

    /* MODAL OVERLAY */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; background: rgba(10,10,10,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .modal-box { position: relative; background: #12151e; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; width: 100%; max-width: 672px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.5); animation: modalIn 0.3s ease; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.92) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

    .modal-close { position: absolute; top: 1rem; right: 1rem; z-index: 10; width: 2rem; height: 2rem; border-radius: 9999px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .modal-close:hover { color: white; }

    .modal-hero { position: relative; height: 13rem; overflow: hidden; border-radius: 1.5rem 1.5rem 0 0; }
    .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
    .modal-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); }
    .modal-hero-label { position: absolute; bottom: 1rem; left: 1.25rem; }
    .modal-hero-type { font-family: var(--font-mono); font-size: 0.6rem; color: var(--primary); letter-spacing: 0.2em; display: block; margin-bottom: 0.25rem; }
    .modal-hero-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: white; line-height: 1.2; }

    .modal-body { padding: 1.5rem; }
    .modal-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; }
    .modal-meta span { display: flex; align-items: center; gap: 0.5rem; }

    .modal-section-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .itinerary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
    .itin-card { border-radius: 0.75rem; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    .itin-img { width: 100%; height: 6rem; object-fit: cover; display: block; }
    .itin-body { padding: 0.75rem; }
    .itin-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; display: block; margin-bottom: 0.25rem; }
    .itin-text { font-size: 0.75rem; color: rgba(240,236,224,0.7); line-height: 1.5; }
    .color-sky { color: #38bdf8; } .color-amber { color: #fbbf24; } .color-emerald { color: #34d399; } .color-violet { color: #a78bfa; }

    /* BOOKING */
    .booking-divider { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1.5rem; }
    .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .booking-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; display: block; margin-bottom: 0.375rem; }
    .booking-input { width: 100%; padding: 0.625rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; color: var(--fg); font-size: 0.875rem; outline: none; transition: box-shadow 0.2s; }
    .booking-input:focus { box-shadow: 0 0 0 2px var(--primary); }
    .booking-input::placeholder { color: var(--muted); }

    .guest-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .guest-btn { width: 2.25rem; height: 2.25rem; border-radius: 9999px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: var(--fg); font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .guest-btn:hover { background: var(--primary); color: white; }
    .guest-count { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; width: 2rem; text-align: center; }

    .total-row { display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-radius: 0.75rem; background: rgba(217,119,6,0.05); border: 1px solid rgba(217,119,6,0.15); margin-bottom: 1rem; }
    .total-left { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; }
    .total-right { text-align: right; }
    .total-label { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); display: block; }
    .total-price { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--primary); }

    .confirm-btn { width: 100%; padding: 1rem; border-radius: 0.75rem; background: var(--primary); color: white; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; min-height: 48px; }
    .confirm-btn:hover { opacity: 0.9; }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .success-state { text-align: center; padding: 2rem 0; }
    .success-emoji { font-size: 3rem; margin-bottom: 0.75rem; }
    .success-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--fg); margin-bottom: 0.5rem; }
    .success-text { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 0.75rem; }
    .success-escrow { display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: var(--primary); font-family: var(--font-mono); font-size: 0.65rem; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 640px) { main { padding: 5rem 1rem 3rem; } .booking-grid, .itinerary-grid { grid-template-columns: 1fr; } }
  </style>
</head>

</div>

  { id:4, title:"南国の楽園・フーコック島リゾート", titleVi:"Nghỉ Dưỡng Phú Quốc", duration:"4日間", destinations:["Phú Quốc"], priceVnd:7800000, priceDisplay:"¥78,000", season:"11月–3月", rating:4.9, reviews:176, highlight:"白砂ビーチと夕日、シーフード三昧", type:"ビーチ・リゾート", img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/5fccd5650_generated_25d3fc30.png", itinerary:{ loc:{img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/5fccd5650_generated_25d3fc30.png",text:"ロングビーチ・サオビーチ・ヴィンパールサファリを訪問。"}, hotel:{img:"https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=400",text:"オーシャンフロント of 5つ星リゾートに宿泊（プール付き）。"}, food:{img:"https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=400",text:"夜市で新鮮グリルシーフード、フーコック産ペッパーを使った料理を堪能。"}, activity:{img:"https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=400",text:"スノーケリング・サンセットクルーズ・イカ釣り体験ツアー。"} } },
  { id:5, title:"ハノイ発 — ニンビン秘境 1日ツアー", titleVi:"Tour Ninh Bình 1 Ngày", duration:"1日間", destinations:["Ninh Bình","Tràng An"], priceVnd:1200000, priceDisplay:"¥12,000", season:"通年", rating:4.6, reviews:89, highlight:"陸のハロン湾と呼ばれる絶景ボート下り", type:"日帰り・自然", img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/fc4715ef0_generated_9233aa59.png", itinerary:{ loc:{img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/fc4715ef0_generated_9233aa59.png",text:"チャンアン・バイディン寺・ムアケーブを1日で効率よく巡ります。"}, hotel:{img:"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?q=80&w=400",text:"日帰りプランのため宿泊なし。ハノイから快適エアコンバスで往復。"}, food:{img:"https://images.unsplash.com/photo-1547592180-85f173990554?q=80&w=400",text:"ニンビン名物の山羊肉料理（Dê Núi）と炭火焼き山羊を体験。"}, activity:{img:"https://images.unsplash.com/photo-1508804185872-d7badad00f7d?q=80&w=400",text:"手漕ぎボートで洞窟をくぐる絶景ルートを約2時間体験。"} } },
  { id:6, title:"テイグエン コーヒーと文化の旅", titleVi:"Cà Phê & Văn Hóa Tây Nguyên", duration:"3日間", destinations:["Buôn Ma Thuột","Đà Lạt"], priceVnd:4500000, priceDisplay:"¥45,000", season:"2月–4月", rating:4.5, reviews:54, highlight:"コーヒー農園体験 và 少数民族の文化", type:"文化・グルメ", img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/c64b21042_generated_ae9f927e.png", itinerary:{ loc:{img:"https://media.base44.com/images/public/6a13e517c2cff5e3b0e223bd/c64b21042_generated_ae9f927e.png",text:"世界珈琲博物館・コーヒー農園・ダラットの花の谷を訪問。"}, hotel:{img:"https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=400",text:"コーヒー農園内のヴィラに宿泊。早朝の霧の中でコーヒーを一杯。"}, food:{img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=400",text:"農園でのコーヒー焙煎体験と、コンウィーゼル（Cà Phê Chồn）の試飲。"}, activity:{img:"https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=400",text:"エデ族のロングハウス訪問と伝統的なゴング音楽の演奏体験。"} } }
];

const TYPES = ["すべて","山岳・文化","文化・歴史","海・クルーズ","ビーチ・リゾート","日帰り・自然","文化・グルメ"];
const itinKeys = [
  { key:"loc",   label:"観光地", cls:"color-sky"     },
  { key:"hotel", label:"宿泊",   cls:"color-amber"   },
  { key:"food",  label:"グルメ", cls:"color-emerald" },
  { key:"activity", label:"文化体験", cls:"color-violet" }
];

let currentPrice = "all";
let currentType  = "すべて";
let guests = 1;
let bookedState = false;
let activeTour = null;

// Build type filter buttons
const typeFilters = document.getElementById("typeFilters");
TYPES.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "type-btn" + (t === "すべて" ? " active" : "");
  btn.textContent = t;
  btn.onclick = () => { 
    currentType = t; 
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active")); 
    btn.classList.add("active"); 
    applyFilters(); 
  };
  typeFilters.appendChild(btn);
});

function setPrice(val, btn) {
  currentPrice = val;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const filtered = toursData.filter(t => {
    const matchSearch = q === "" || t.title.includes(q) || t.titleVi.toLowerCase().includes(q) || t.destinations.some(d => d.toLowerCase().includes(q));
    const matchType = currentType === "すべて" || t.type === currentType;
    const matchPrice = currentPrice === "all" || (currentPrice === "low" && t.priceVnd <= 3000000) || (currentPrice === "mid" && t.priceVnd > 3000000 && t.priceVnd <= 7000000) || (currentPrice === "high" && t.priceVnd > 7000000);
    return matchSearch && matchType && matchPrice;
  });
  renderGrid(filtered);
}

// Tối ưu hóa render bằng phương thức tạo chuỗi mảng hiệu năng cao
function renderGrid(items) {
  const grid = document.getElementById("toursGrid");
  const empty = document.getElementById("emptyState");
  const count = document.getElementById("countLabel");
  
  count.textContent = items.length + " ツアー表示中";
  empty.style.display = items.length === 0 ? "block" : "none";
  
  if (items.length === 0) {
    grid.innerHTML = "";
    return;
  }

  const htmlContent = items.map((tour, i) => {
    const dest = tour.destinations.slice(0,2).join(" → ") + (tour.destinations.length > 2 ? " …" : "");
    return `
      <div class="tour-card" style="animation-delay:${i*0.05}s" onclick="openModal(${tour.id})">
        <div class="tc-img-wrap">
          <img class="tc-img" src="${tour.img}" alt="${tour.title}" loading="lazy"/>
          <div class="tc-img-overlay"></div>
          <span class="tc-type">${tour.type}</span>
          <div class="tc-rating"><span class="tc-star">★</span>${tour.rating}</div>
        </div>
        <div class="tc-body">
          <p class="tc-season">${tour.season}</p>
          <h3 class="tc-title">${tour.title}</h3>
          <p class="tc-title-vi">${tour.titleVi}</p>
          <div class="tc-meta">
            <span>🕐 ${tour.duration}</span>
            <span>📍 ${dest}</span>
          </div>
          <p class="tc-highlight">${tour.highlight}</p>
          <div class="tc-footer">
            <div><span class="tc-from">FROM</span><span class="tc-price">${tour.priceDisplay}</span></div>
            <button class="tc-btn">詳細 →</button>
          </div>
        </div>
      </div>`;
  }).join('');

  grid.innerHTML = htmlContent;
}

function openModal(id) {
  activeTour = toursData.find(t => t.id === id);
  if (!activeTour) return;
  
  guests = 1; 
  bookedState = false;
  
  document.getElementById("mImg").src = activeTour.img;
  document.getElementById("mImg").alt = activeTour.title;
  document.getElementById("mType").textContent = activeTour.type;
  document.getElementById("mTitle").textContent = activeTour.title;
  
  document.getElementById("mMeta").innerHTML = `
    <span>🕐 ${activeTour.duration}</span>
    <span>📍 ${activeTour.destinations.join(" → ")}</span>
    <span>★ <span style="color:var(--primary)">${activeTour.rating}</span> <span style="color:var(--muted)">(${activeTour.reviews} 件)</span></span>`;
    
  document.getElementById("mItinerary").innerHTML = itinKeys.map(k => `
    <div class="itin-card">
      <img class="itin-img" src="${activeTour.itinerary[k.key].img}" alt="${k.label}" loading="lazy"/>
      <div class="itin-body">
        <span class="itin-label ${k.cls}">${k.label}</span>
        <p class="itin-text">${activeTour.itinerary[k.key].text}</p>
      </div>
    </div>`).join("");
    
  renderBooking();
  document.getElementById("modalOverlay").style.display = "flex";
}

function renderBooking() {
  const booking = document.getElementById("mBooking");
  if (bookedState) return;

  const total = (activeTour.priceVnd * guests).toLocaleString("en-US");
  booking.innerHTML = `
    <p class="modal-section-label">── 予約手続き</p>
    <div class="booking-grid">
      <div>
        <label class="booking-label" for="nameInput">参加者氏名</label>
        <input class="booking-input" id="nameInput" type="text" placeholder="お名前を入力"/>
      </div>
      <div>
        <label class="booking-label">人数</label>
        <div class="guest-ctrl">
          <button class="guest-btn" onclick="changeGuests(-1)">−</button>
          <span class="guest-count" id="guestCount">${guests}</span>
          <button class="guest-btn" onclick="changeGuests(1)">+</button>
        </div>
      </div>
    </div>
    <div class="total-row">
      <div class="total-left">🛡️ エスクロー保証</div>
      <div class="total-right"><span class="total-label">合計</span><span class="total-price" id="totalPrice">${total} VND</span></div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmBooking()">安全決済へ進む</button>`;
}

function changeGuests(delta) {
  guests = Math.max(1, guests + delta);
  const countEl = document.getElementById("guestCount");
  const priceEl = document.getElementById("totalPrice");
  
  if (countEl) countEl.textContent = guests;
  if (priceEl) priceEl.textContent = (activeTour.priceVnd * guests).toLocaleString("en-US") + " VND";
}

function confirmBooking() {
  const nameInput = document.getElementById("nameInput");
  if (!nameInput) return;
  
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.focus();
    return;
  }
  
  bookedState = true;
  document.getElementById("mBooking").innerHTML = `
    <div class="success-state">
      <div class="success-emoji">🎉</div>
      <h3 class="success-title">予約完了！</h3>
      <p class="success-text">${name}様の旅程が確定しました。<br/>担当者より24時間以内にご連絡いたします。</p>
      <div class="success-escrow">🛡️ エスクロー決済で安全に保護されています</div>
    </div>`;
}

function closeModal(e) { 
  if (e.target === document.getElementById("modalOverlay")) {
    document.getElementById("modalOverlay").style.display = "none"; 
  }
}

// Khởi chạy ứng dụng
applyFilters();
</script>
</body>
</html>
